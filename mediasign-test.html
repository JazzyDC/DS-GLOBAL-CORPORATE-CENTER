<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediasign Inline Test</title>
<style>
  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #2E318E;
    color: #FFFFFF;
    font-family: Arial, sans-serif;
    display: grid;
    place-items: center;
  }

  .box {
    padding: 48px;
    border: 8px solid #22D3EE;
    border-radius: 20px;
    text-align: center;
    background: #0F2549;
  }

  h1 {
    margin: 0 0 20px;
    font-size: 54px;
  }

  p {
    margin: 10px 0;
    font-size: 34px;
    font-weight: 700;
  }

  .css-ok {
    color: #22D3EE;
  }

  .js-status {
    color: #FDE047;
  }
</style>
</head>
<body>
<div class="box">
  <h1>MEDIASIGN TEST</h1>
  <p class="css-ok">CSS STATUS: WORKING IF THIS IS BLUE</p>
  <p class="js-status" id="jsStatus">JS STATUS: NOT RUNNING</p>
</div>
<script>
  document.getElementById("jsStatus").textContent = "JS STATUS: WORKING";
</script>
</body>
</html>
